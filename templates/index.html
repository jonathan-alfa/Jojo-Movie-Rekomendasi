<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jo Movie Rekomendasi</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div id="loading-screen">
        <div class="loader"></div>
        <div class="loading-text mt-3 text-white">AI Sedang Mencari Film Terbaik...</div>
    </div>

    <nav class="navbar navbar-custom">
        <div class="container">
            <span class="navbar-brand mb-0 h1"><i class="fas fa-film me-2"></i>JOMOVIE</span>
        </div>
    </nav>

    <section class="hero-section">
        <div class="container">
            <h1 class="hero-title">Temukan Tontonan Favoritmu</h1>
        </div>
    </section>

    <div class="container">
        <div class="search-box">
            <form method="POST" action="/" id="ai-form">
                <div class="mb-4">
                    <label class="form-label text-muted">Pilih film favoritmu:</label>
                    <select class="form-select bg-dark text-white" name="selected_movie" required>
                        <option value="" disabled selected>-- Pilih Judul Film --</option>
                        {% for title in movie_titles %}
                            <option value="{{ title }}">{{ title }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="submit" class="btn btn-danger w-100 fw-bold">Dapatkan Rekomendasi</button>
            </form>
        </div>
    </div>

    <div class="container mb-5">
        {% if names %}
            <h3 class="result-title">Rekomendasi untuk "{{ selected_movie }}":</h3>
            <div class="row mt-4">
                {% for i in range(names|length) %}
                    <div class="col-lg-2 col-md-4 col-6 mb-4">
                        <div class="movie-card h-100">
                            <img src="{{ posters[i] }}" class="card-img-top" onerror="this.src='https://via.placeholder.com/500x750?text=No+Poster'">
                            <div class="card-body">
                                <h6 class="movie-title text-white small">{{ names[i] }}</h6>
                            </div>
                        </div>
                    </div>
                {% endfor %}
            </div>
        {% endif %}
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
